name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-test-lint:
    name: Lint, Unit & E2E Tests, Build
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # 3. Install dependencies including Playwright
      - name: Install dependencies
        run: |
          npm ci
          npx playwright install

      # 4. Run ESLint
      - name: Run ESLint
        run: npm run lint

      # 5. Run Unit Tests
      - name: Run unit tests
        run: npm run test -- --run

      # 6. Build project
      - name: Build project
        run: npm run build

      # 7. Start dev server in background
      - name: Start dev server
        run: npm run dev &
      
      # 8. Wait until server is ready
      - name: Wait for server
        run: npx wait-on http://localhost:5173

      # 9. Run Playwright E2E tests
      - name: Run Playwright E2E tests
        run: npx playwright test --config=playwright.config.js
