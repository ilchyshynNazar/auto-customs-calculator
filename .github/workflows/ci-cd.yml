name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-test-lint:
    name: Lint, Unit & E2E Tests, Build
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run ESLint
      - name: Run ESLint
        run: npm run lint

      # Run Unit Tests (Vitest)
      - name: Run unit tests
        run: npm run test -- --run

      # Build project
      - name: Build project
        run: npm run build

      # Start dev server for Playwright E2E tests
      - name: Start dev server
        run: npm run dev &
      
      # Wait until server is ready
      - name: Wait for server
        run: npx wait-on http://localhost:5173

      # Run Playwright E2E tests
      - name: Run Playwright E2E tests
        run: npm run test:e2e
