name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-test-lint:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      #Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      #Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      #Install deps
      - name: Install dependencies
        run: npm ci

      #Lint
      - name: Run ESLint
        run: npm run lint

      #Unit tests (Vitest)
      - name: Run unit tests
        run: npm run test -- --run

      #Build
      - name: Build project
        run: npm run build
